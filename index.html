<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestor Controladoria</title>
    
    <link rel="icon" type="image/jpeg" href="https://i.ibb.co/PGLzTxm8/LOGO-GESTOR.jpg">
    <link rel="shortcut icon" href="https://i.ibb.co/PGLzTxm8/LOGO-GESTOR.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="https://i.ibb.co/PGLzTxm8/LOGO-GESTOR.jpg">
    
    <style>
        @font-face {
            font-family: 'Link Sans Product';
            src: url(https://assets.production.linktr.ee/fonts/LinkSansProduct.woff2) format('woff2');
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Link Sans Product', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #e5e7eb;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1.5;
            padding: 16px;
        }

        .profile-container {
            max-width: 580px;
            width: 100%;
            background-color: #ffffff;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            position: relative;
        }

        .profile-content {
            padding: 40px 24px 32px;
        }

        @media (min-width: 580px) {
            .profile-content {
                padding: 48px 32px 40px;
            }
        }

        .avatar {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .avatar img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffffff;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .profile-title {
            text-align: center;
            margin-bottom: 32px;
        }

        .profile-title h1 {
            color: #111827;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .profile-title p {
            color: #4b5563;
            font-size: 16px;
            font-weight: 400;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-item {
            width: 100%;
        }

        .link-button {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            min-height: 70px;
            padding: 16px 24px;
            background-color: #2A3235;
            border-radius: 16px;
            text-decoration: none;
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.4;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .link-button:hover {
            background-color: #1e2528;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .simple-footer {
            text-align: center;
            padding: 24px 24px 32px;
            border-top: 1px solid #f3f4f6;
            margin-top: 8px;
        }

        .simple-footer p {
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-content">
            
            <div class="avatar">
                <img 
                    src="https://i.ibb.co/PGLzTxm8/LOGO-GESTOR.jpg" 
                    alt="Gestor Controladoria"
                >
            </div>

            <div class="profile-title">
                <h1>Gestor Controladoria</h1>
            </div>

            <div class="links-container">
                <div class="link-item">
                    <a href="https://wa.me/5537991109192" target="_blank" rel="noopener noreferrer" class="link-button">
                        Contabilidade, Consultoria e Reengenharia de Processos Empresariais 🏦
                    </a>
                </div>

                <div class="link-item">
                    <a href="https://wa.me/5537991944830" target="_blank" rel="noopener noreferrer" class="link-button">
                        Abertura De Empresas, Comércio Eletrônico, Consultoria Tributária e Serviços PJ e PF❗
                    </a>
                </div>
            </div>
        </div>

        <div class="simple-footer">
            <p>© 2026 Gestor Controladoria • Todos Os Direitos Reservados</p>
        </div>
    </div>
</body>
</html>
